<!doctype html>
<html lang="en" data-mode="light" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eric Lou 卢东奇 · Data + Quant + AI</title>
<meta name="description" content="Eric Lou (卢东奇) — Data, Quant & AI. Econometrics to production AI systems: forecasting, backtesting, LLM platforms. EN · 简体 · 繁體">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700;900&family=Noto+Serif+SC:wght@600;900&family=Noto+Serif+TC:wght@600;900&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* 墨分五色 · v3 — living ink, three tongues, demos that run */
:root{
  --paper:#f4f0e6;--paper-2:#ece7d9;
  --jiao:#181410;--nong:#332d24;--zhong:#5b5344;--dan:#8b816d;--qing:#c2b9a4;
  --shu:#a63a26;--ai:#33586a;--gold:transparent;--up:#a63a26;--dn:#33586a;
  --mist1:rgba(24,20,16,.16);--mist2:rgba(24,20,16,.09);--mist3:rgba(24,20,16,.045);
  --card:rgba(255,255,255,.42);--shadow:0 18px 50px -18px rgba(24,20,16,.25);
}
html[data-mode="dark"]{
  --paper:#101218;--paper-2:#0b0d11;
  --jiao:#efe9da;--nong:#d6cfbe;--zhong:#a29a86;--dan:#6f6857;--qing:#37373a;
  --shu:#c9503a;--ai:#7fa8bd;--gold:#b9962e;--up:#c9503a;--dn:#7fa8bd;
  --mist1:rgba(239,233,218,.13);--mist2:rgba(239,233,218,.07);--mist3:rgba(239,233,218,.035);
  --card:rgba(255,255,255,.03);--shadow:0 18px 50px -18px rgba(0,0,0,.6);
}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--nong);font:16px/1.75 "IBM Plex Sans",-apple-system,sans-serif;
  transition:background .6s,color .6s;overflow-x:hidden}
html[data-lang="sc"] body{font-family:"IBM Plex Sans","Noto Sans SC",-apple-system,sans-serif}
html[data-lang="tc"] body{font-family:"IBM Plex Sans","Noto Sans TC",-apple-system,sans-serif}
::selection{background:var(--shu);color:var(--paper)}
a{color:var(--ai);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--ai) 35%,transparent)}
a:hover{border-bottom-color:var(--ai)}
.mincho{font-family:"Zen Old Mincho","Noto Serif SC","Noto Serif TC",serif}
.mono{font-family:"IBM Plex Mono",monospace}
#journeySvg{position:absolute;top:0;left:0;width:130px;height:100%;z-index:0;pointer-events:none;opacity:.85}
@media(max-width:1180px){#journeySvg{display:none}}
.inkdrop{position:fixed;border-radius:50%;pointer-events:none;z-index:80;
  background:radial-gradient(circle,color-mix(in srgb,var(--jiao) 55%,transparent) 0%,color-mix(in srgb,var(--jiao) 18%,transparent) 45%,transparent 70%);
  animation:drop .8s ease-out forwards}
@keyframes drop{from{transform:scale(.1);opacity:.8}to{transform:scale(1);opacity:0}}
nav.rail{position:fixed;left:0;top:0;bottom:0;width:64px;z-index:40;display:flex;flex-direction:column;
  align-items:center;gap:24px;padding:24px 0;border-right:1px solid var(--qing);
  background:color-mix(in srgb,var(--paper) 82%,transparent);backdrop-filter:blur(8px)}
nav.rail a{writing-mode:vertical-rl;letter-spacing:.5em;border:0;font-family:"Zen Old Mincho","Noto Serif TC",serif;
  font-size:14px;color:var(--dan);transition:color .25s}
nav.rail a:hover,nav.rail a.on{color:var(--shu)}
nav.rail .seal-mini{margin-top:auto}
main{margin-left:64px;position:relative}
@media(max-width:820px){nav.rail{display:none}main{margin-left:0}}
.topbar{position:fixed;right:0;top:0;z-index:41;display:flex;gap:8px;align-items:center;padding:16px 22px}
.mode-btn,.lang-btn{cursor:pointer;border:1px solid var(--qing);background:var(--card);color:var(--nong);
  border-radius:999px;padding:7px 13px;font:13px "IBM Plex Mono",monospace;letter-spacing:.06em;transition:border-color .25s}
.mode-btn:hover,.lang-btn:hover{border-color:var(--shu)}
.lang-btn.on{border-color:var(--shu);color:var(--shu)}
.mode-btn:focus-visible,.lang-btn:focus-visible,a:focus-visible,button:focus-visible{outline:2px solid var(--shu);outline-offset:3px}
header.hero{position:relative;height:96svh;min-height:560px;display:flex;align-items:center;overflow:hidden}
@media(max-width:600px){.hero-inner{padding:70px 7vw 80px !important}}
section{scroll-margin-top:24px}
#inkgl{position:absolute;inset:0;width:100%;height:100%;display:block}
.mountains{position:absolute;inset:0;pointer-events:none;z-index:1}
.mountains svg{position:absolute;bottom:-2px;left:0;width:100%}
.hero-inner{position:relative;z-index:3;max-width:960px;padding:120px 8vw 150px}
.eyebrow{font:500 13px/1 "IBM Plex Mono",monospace;letter-spacing:.35em;color:var(--dan);text-transform:uppercase}
.hero h1{font-family:"Zen Old Mincho","Noto Serif SC","Noto Serif TC",serif;font-weight:900;color:var(--jiao);
  font-size:clamp(48px,8.2vw,100px);line-height:1.05;margin:18px 0 6px}
.hero .han{display:block;font-weight:900;font-size:clamp(24px,3.6vw,40px);letter-spacing:.42em;color:var(--zhong);margin-top:12px}
.hero .role{font:300 clamp(18px,2.5vw,24px)/1.5 inherit;color:var(--nong);margin:26px 0 8px}
.hero .role b{font-weight:600;color:var(--jiao)}
.hero .thesis{max-width:560px;color:var(--zhong);font-size:16.5px}
.hero-cta{display:flex;gap:14px;align-items:center;margin-top:34px;flex-wrap:wrap}
.btn-ink{display:inline-block;border:1.5px solid var(--jiao);color:var(--jiao);border-radius:2px;
  padding:11px 26px;font:500 14px inherit;letter-spacing:.06em;transition:.25s;cursor:pointer;background:none}
.btn-ink:hover{background:var(--jiao);color:var(--paper);border-bottom-color:var(--jiao)}
.btn-ghost{color:var(--zhong);font-size:14px;border-bottom:1px solid var(--qing)}
.seal-wrap{position:absolute;right:7vw;bottom:22vh;z-index:3;width:150px;height:150px}
.seal-wrap svg.enso{position:absolute;inset:-14px;width:178px;height:178px;transform:rotate(-12deg)}
.enso path{fill:none;stroke:var(--zhong);stroke-width:3.4;stroke-linecap:round;opacity:.75}
.seal{position:absolute;inset:33px;transform:rotate(-4deg);background:var(--shu);color:#f4efe2;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-family:"Noto Serif TC","Noto Serif SC",serif;font-weight:900;
  font-size:36px;writing-mode:vertical-rl;letter-spacing:4px;
  box-shadow:inset 0 0 0 3px rgba(244,239,226,.85),inset 0 0 0 5px var(--shu),0 8px 30px -10px rgba(166,58,38,.55)}
.seal small{font-size:11px;letter-spacing:5px;opacity:.9}
@media(max-width:820px){.seal-wrap{right:5vw;bottom:7vh;transform:scale(.72);transform-origin:bottom right}}
section{position:relative;max-width:1080px;margin:0 auto;padding:105px 8vw;z-index:2}
.sec-head{display:flex;align-items:baseline;gap:22px;margin-bottom:54px}
.sec-han{font-family:"Zen Old Mincho","Noto Serif TC","Noto Serif SC",serif;font-weight:700;font-size:46px;color:var(--jiao);line-height:1;position:relative}
.sec-han::after{content:"";position:absolute;left:-8px;right:-8px;bottom:2px;height:14px;z-index:-1;
  background:linear-gradient(90deg,var(--mist1),var(--mist3) 80%,transparent);border-radius:2px}
.sec-title{font:300 15px/1.4 "IBM Plex Mono",monospace;letter-spacing:.24em;text-transform:uppercase;color:var(--dan)}
.sec-note{margin-left:auto;font-size:13px;color:var(--dan)}
@media(max-width:640px){.sec-note{display:none}}
.rv{opacity:0;transform:translateY(18px);transition:opacity .8s ease,transform .8s ease}
.rv.in{opacity:1;transform:none}
.langswap .rv{transition:none !important}
@media(prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}html{scroll-behavior:auto}
  #inkgl,#journeySvg{display:none}.inkdrop{display:none}}
.skills{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:34px 54px}
.skill .s-row{display:flex;justify-content:space-between;align-items:baseline}
.skill .s-name{font-weight:600;color:var(--jiao);font-size:15.5px}
.skill .s-lv{font:400 11.5px "IBM Plex Mono",monospace;color:var(--dan);letter-spacing:.12em}
.skill svg{display:block;width:100%;height:26px;margin-top:2px}
.skill path{stroke-dasharray:var(--len);stroke-dashoffset:var(--len);transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.skill.in path{stroke-dashoffset:0}
.skill .s-items{font-size:13px;color:var(--zhong);margin-top:4px;line-height:1.7}
.inklegend{margin-top:44px;font-size:12.5px;color:var(--dan)}
.inklegend i{display:inline-block;width:34px;height:8px;border-radius:4px;vertical-align:middle;margin:0 6px 0 16px}
.timeline{position:relative;padding-left:34px}
.timeline::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;
  background:linear-gradient(var(--qing),var(--mist1),var(--qing))}
.t-item{position:relative;padding:0 0 56px}
.t-item::before{content:"";position:absolute;left:-31px;top:8px;width:12px;height:12px;border-radius:50%;
  background:var(--paper);border:2.5px solid var(--zhong)}
.t-item.now::before{background:var(--shu);border-color:var(--shu);box-shadow:0 0 0 5px color-mix(in srgb,var(--shu) 18%,transparent)}
.t-when{font:500 12px "IBM Plex Mono",monospace;letter-spacing:.14em;color:var(--dan)}
.t-role{font-family:"Zen Old Mincho","Noto Serif SC","Noto Serif TC",serif;font-weight:700;font-size:23px;color:var(--jiao);margin:6px 0 2px}
.t-org{font-size:14.5px;color:var(--shu);font-weight:500}
.t-body{margin-top:10px;max-width:640px;color:var(--zhong);font-size:15px}
.t-body ul{padding-left:18px;margin:8px 0 0}.t-body li{margin:5px 0}
.scroll-label{display:flex;align-items:center;gap:16px;margin:8px 0 26px}
.scroll-label .tag{font-family:"Zen Old Mincho","Noto Serif SC","Noto Serif TC",serif;font-weight:700;font-size:22px;color:var(--jiao)}
.scroll-label .line{flex:1;height:1px;background:linear-gradient(90deg,var(--qing),transparent)}
.scroll-label .sub{font:400 12px "IBM Plex Mono",monospace;color:var(--dan);letter-spacing:.12em}
.projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:22px;margin-bottom:46px}
.card{position:relative;border:1px solid var(--qing);border-radius:3px;background:var(--card);
  padding:26px 24px 22px;box-shadow:var(--shadow);transition:transform .3s,border-color .3s;
  display:flex;flex-direction:column;gap:10px;overflow:hidden}
.card:hover{transform:translateY(-4px);border-color:var(--zhong)}
.card::before{content:"";position:absolute;top:12px;left:12px;right:12px;bottom:12px;
  border:1px solid color-mix(in srgb,var(--qing) 55%,transparent);border-radius:2px;pointer-events:none}
.card h3{margin:0;font-family:"Zen Old Mincho","Noto Serif SC","Noto Serif TC",serif;font-size:19px;color:var(--jiao)}
.card .p-tag{font:500 10.5px "IBM Plex Mono",monospace;letter-spacing:.18em;text-transform:uppercase;color:var(--shu)}
.card p{margin:0;font-size:13.8px;color:var(--zhong);flex:1}
.card .p-stack{font:400 11.5px "IBM Plex Mono",monospace;color:var(--dan);line-height:1.8}
.card .p-demo{font-size:12.5px;color:var(--ai)}
/* demos */
.demo{border:1px solid var(--qing);border-radius:3px;background:var(--card);box-shadow:var(--shadow);
  padding:24px;margin-bottom:26px;position:relative;overflow:hidden}
.demo h3{margin:0 0 4px;font-family:"Zen Old Mincho","Noto Serif SC","Noto Serif TC",serif;font-size:20px;color:var(--jiao)}
.demo .d-sub{font-size:13px;color:var(--dan);margin-bottom:14px}
.demo canvas{width:100%;display:block;border-radius:2px}
.d-controls{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin:12px 0 4px;font-size:13px;color:var(--zhong)}
.d-controls label{display:flex;gap:8px;align-items:center}
.d-controls input[type=range]{accent-color:var(--shu);width:130px}
.d-stats{display:flex;gap:26px;flex-wrap:wrap;font:500 12.5px "IBM Plex Mono",monospace;color:var(--zhong);margin-top:8px}
.d-stats b{color:var(--jiao);font-size:15px}
.d-stats .pos{color:var(--shu)}.d-stats .neg{color:var(--ai)}
.d-note{font-size:12px;color:var(--dan);margin-top:10px}
.rconsole{background:#0d0f13;color:#cfd6c3;border-radius:3px;border:1px solid var(--qing);
  font:12.5px/1.6 "IBM Plex Mono",monospace;padding:14px 16px;max-height:300px;overflow:auto;white-space:pre-wrap}
.rconsole .rin{color:#8fb573}.rconsole .rerr{color:#d髭}.rconsole .rerr{color:#d97b6c}
.rbadge{display:inline-flex;align-items:center;gap:8px;font:600 12px "IBM Plex Mono",monospace;color:var(--paper);
  background:#276dc3;border-radius:3px;padding:3px 10px;letter-spacing:.08em}
/* journey map */
.mapwrap{position:relative}
#inkmap{width:100%;height:auto;display:block}
#inkmap .land{fill:var(--mist2);stroke:var(--zhong);stroke-width:1.6;stroke-linejoin:round}
#inkmap .route{fill:none;stroke:var(--shu);stroke-width:2.6;stroke-linecap:round;stroke-dasharray:7 9;opacity:.9}
#inkmap .city{cursor:pointer}
#inkmap .city circle{fill:var(--paper);stroke:var(--shu);stroke-width:2.4;transition:r .2s}
#inkmap .city:hover circle,#inkmap .city.on circle{fill:var(--shu)}
#inkmap .city text{font:600 13px "Zen Old Mincho","Noto Serif TC",serif;fill:var(--jiao)}
#inkmap .sea{font:400 12px "Zen Old Mincho",serif;fill:var(--dan);letter-spacing:.4em}
.map-card{border:1px dashed var(--qing);border-radius:3px;background:var(--card);padding:16px 20px;
  font-size:14px;color:var(--zhong);max-width:520px;margin-top:14px;min-height:64px}
.map-card b{color:var(--jiao)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:60px}
@media(max-width:760px){.two-col{grid-template-columns:1fr}}
.edu-item{margin-bottom:30px}
.edu-deg{font-family:"Zen Old Mincho","Noto Serif SC","Noto Serif TC",serif;font-weight:600;font-size:18px;color:var(--jiao)}
.edu-org{font-size:14px;color:var(--zhong)}
.pub{font-size:14.5px;color:var(--zhong);margin-bottom:18px;padding-left:20px;position:relative}
.pub::before{content:"—";position:absolute;left:0;color:var(--shu)}
.contact-wrap{display:flex;gap:60px;flex-wrap:wrap;align-items:flex-start}
.contact-kv{display:grid;grid-template-columns:auto 1fr;gap:10px 26px;font-size:15px}
.contact-kv b{font:500 12px "IBM Plex Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--dan);padding-top:2px}
.private-note{border:1px dashed var(--qing);border-radius:3px;padding:18px 22px;max-width:380px;
  font-size:13.5px;color:var(--zhong);background:var(--card)}
.private-note b{color:var(--shu)}
.gold-rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border:0;margin:60px auto 0;max-width:420px}
footer{padding:60px 8vw 80px;text-align:center;color:var(--dan);font-size:12.5px;position:relative;z-index:2}
footer .enso-f{font-family:"Zen Old Mincho",serif;font-size:30px;color:var(--zhong);display:block;margin-bottom:10px}


/* ── 问墨 inkchat v2: language-adaptive hand-scroll ── */
#inkTab{position:fixed;right:0;top:52%;z-index:60;writing-mode:vertical-rl;background:var(--paper,#f5f1e8);
  border:1.5px solid #b43a2b;border-right:none;color:#b43a2b;font:700 14px/1.4 "Zen Old Mincho","Noto Serif SC",serif;
  letter-spacing:.3em;padding:14px 8px;border-radius:6px 0 0 6px;cursor:pointer;box-shadow:0 2px 12px rgba(28,26,23,.12);
  animation:inkBreath 3.2s ease-in-out infinite}
@keyframes inkBreath{0%,100%{box-shadow:0 2px 12px rgba(180,58,43,.12)}50%{box-shadow:0 2px 18px rgba(180,58,43,.35)}}
#inkTab:hover{background:#b43a2b;color:#f5f1e8;animation:none}
#inkDrawer{position:fixed;top:0;right:-580px;width:min(560px,100vw);height:100dvh;z-index:70;background:#f5f1e8;
  border-left:1px solid #d9d4c9;box-shadow:-8px 0 30px rgba(28,26,23,.15);transition:right .45s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;font-family:"Noto Serif SC",serif;color:#1c1a17}
#inkDrawer.open{right:0}
#inkDrawer .hd{display:flex;gap:12px;align-items:center;padding:16px 18px 10px;border-bottom:1px dashed #d9d4c9}
#inkDrawer .hd .v{writing-mode:vertical-rl;font:700 20px/1.3 "Zen Old Mincho",serif;letter-spacing:.24em;max-height:88px;pointer-events:none}
#inkDrawer .hd .seal{background:#b43a2b;color:#f5f1e8;writing-mode:vertical-rl;font:700 10px/1 serif;padding:5px 3px;
  border-radius:2px;flex:0 0 auto;width:20px;height:max-content;align-self:center;pointer-events:none}
#inkDrawer .hd p{margin:0;flex:1;color:#57514a;font-size:11.5px;line-height:1.8}
#inkDrawer .hd button{border:none;background:none;color:#9a938a;font-size:22px;cursor:pointer;padding:6px}
#inkDrawer .hd button:hover{color:#b43a2b}
#inkGate{padding:14px 18px;display:flex;gap:8px;flex-wrap:wrap}
#inkGate input{flex:1;min-width:130px;padding:12px;border:1px solid #d9d4c9;background:#faf8f2;font-family:inherit;font-size:16px}
#inkGate button{padding:12px 20px;border:1.5px solid #b43a2b;background:none;color:#b43a2b;font-family:inherit;
  font-weight:700;letter-spacing:.2em;cursor:pointer}
#inkGate button:hover{background:#b43a2b;color:#f5f1e8}
#inkGate .err{width:100%;color:#b43a2b;font-size:11.5px}
#inkScroll{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:row;align-items:stretch;gap:10px;
  padding:14px;background:linear-gradient(#f5f1e8,#f2eee4)}
.leaf{flex:0 0 auto;animation:leafIn .5s ease both}
@keyframes leafIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.leaf .who{font-weight:700;letter-spacing:.18em;color:#b43a2b;font-size:11px;margin-bottom:6px}
.leaf.q .who{color:#4a453d}
.leaf.zh{writing-mode:vertical-rl;max-height:100%;font-size:13.5px;line-height:2;letter-spacing:.08em;
  padding:8px 10px;border-left:1px dashed #d9d4c9}
.leaf.zh .who{writing-mode:vertical-rl;margin:0 0 10px}
.leaf.en{width:min(300px,72vw);max-height:100%;overflow-y:auto;font-size:13px;line-height:1.85;
  background:#faf8f2;border:1px solid #e3ded2;border-radius:3px;padding:12px 14px;align-self:center;
  box-shadow:0 1px 6px rgba(28,26,23,.05)}
.leaf .txt{white-space:pre-wrap}
.inkWait i{display:inline-block;width:7px;height:7px;border-radius:50%;background:#b43a2b;
  animation:inkPulse 1.1s ease-in-out infinite}
@keyframes inkPulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
#inkHints{display:flex;gap:8px;flex-wrap:wrap;padding:0 18px 8px}
#inkHints button{border:1px solid #d9d4c9;background:#faf8f2;color:#57514a;border-radius:14px;
  padding:7px 13px;font-family:inherit;font-size:12px;cursor:pointer}
#inkHints button:hover{border-color:#b43a2b;color:#b43a2b}
#inkAsk{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #d9d4c9;background:#faf8f2}
#inkAsk input{flex:1;padding:12px;border:1px solid #d9d4c9;background:#f5f1e8;font-family:inherit;font-size:16px}
#inkAsk button{padding:12px 20px;border:1.5px solid #1c1a17;background:none;color:#1c1a17;font-family:inherit;
  font-weight:700;letter-spacing:.24em;cursor:pointer;min-width:88px}
#inkAsk button:hover{background:#1c1a17;color:#f5f1e8}
#inkAsk button:disabled{opacity:.45;cursor:wait}
html[data-mode="dark"] #inkDrawer{background:#171512;color:#e8e2d5;border-left-color:#3a352d}
html[data-mode="dark"] #inkDrawer .hd{border-bottom-color:#3a352d}
html[data-mode="dark"] #inkGate input,html[data-mode="dark"] #inkAsk input{background:#1f1c18;border-color:#3a352d;color:#e8e2d5}
html[data-mode="dark"] #inkScroll{background:linear-gradient(#171512,#14120f)}
html[data-mode="dark"] .leaf.en{background:#1c1915;border-color:#3a352d;box-shadow:none}
html[data-mode="dark"] .leaf.zh{border-left-color:#3a352d}
html[data-mode="dark"] #inkHints button{background:#1c1915;border-color:#3a352d;color:#b5ad9e}
html[data-mode="dark"] #inkAsk button{border-color:#e8e2d5;color:#e8e2d5}
html[data-mode="dark"] #inkTab{background:#171512}

/* ── 印 · print / save-as-PDF: quiet paper, no theatre ── */
@media print{
  :root{--paper:#fff}

<script>
const $id=s=>document.getElementById(s),esc=s=>String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const REDUCED=matchMedia("(prefers-reduced-motion: reduce)").matches;
let LANG="en",PRIV=null;
const T=()=>L10N[LANG];

/* seeded PRNG + shared synthetic market data (regenerated once) */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rnd=mulberry32(20260702);
const OHLC=(()=>{const n=260,out=[];let p=100;for(let i=0;i<n;i++){
  const drift=(i<90?.0006:i<170?-.0004:.0009),vol=.013+.006*Math.sin(i/28);
  const o=p,c=p*(1+drift+(rnd()*2-1)*vol);
  const h=Math.max(o,c)*(1+rnd()*vol*.7),l=Math.min(o,c)*(1-rnd()*vol*.7);
  out.push({o,h,l,c});p=c;}return out;})();
const RETAIL=(()=>{const out=[];let base=48;for(let i=0;i<120;i++){ // monthly, trend+season like the Monash series
  const season=[0,-2,1,3,2,1,0,-1,1,3,6,12][i%12];
  base*=1.004;out.push(+(base+season+(rnd()*2-1)*2.2).toFixed(2));}return out;})();

/* ---------- i18n render ---------- */
function render(){
  const t=T();document.documentElement.dataset.lang=LANG;
  document.documentElement.lang=LANG==="en"?"en":(LANG==="sc"?"zh-Hans":"zh-Hant");
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.toggle("on",b.dataset.lang===LANG));
  $id("railNav").innerHTML=[["#top",0],["#skills",1],["#exp",2],["#work",3],["#map",4],["#edu",5],["#contact",6]]
    .map(([h,i])=>`<a href="${h}" class="mincho">${t.rail[i]}</a>`).join("")+
    `<span class="seal-mini mincho" style="color:var(--shu);font-size:18px" aria-hidden="true">印</span>`;
  $id("eyebrow").textContent=t.eyebrow;
  $id("nameSpan").textContent=t.name;$id("hanSpan").textContent=t.han;
  $id("roleLine").innerHTML=t.roles.map(r=>`<b>${esc(r)}</b>`).join(" + ")+` — <span class="mono" style="font-size:.72em;color:var(--dan)">${esc(t.years)}</span>`;
  $id("thesisP").textContent=t.thesis;
  $id("ctaWork").textContent=t.cta_work;$id("ctaContact").textContent=t.cta_contact;
  for(const[k,cap]of[["skills","Skills"],["exp","Exp"],["work","Work"],["map","Map"],["edu","Edu"],["contact","Contact"]]){
    const s=t.sec[k];$id("han"+cap).textContent=s[0];$id("title"+cap).textContent=s[1];
    const n=$id("note"+cap);if(n)n.textContent=s[2]||"";}
  const INK=["","var(--qing)","var(--dan)","var(--zhong)","var(--nong)","var(--jiao)"];
  $id("skillsGrid").innerHTML=t.skills.map((s,i)=>{const len=34+s.lv*13,ink=INK[s.lv];
    return `<div class="skill rv in" style="transition-delay:${i*60}ms">
    <div class="s-row"><span class="s-name">${esc(s.name)}</span><span class="s-lv">${t.lvn[s.lv]}</span></div>
    <svg viewBox="0 0 100 12" preserveAspectRatio="none" aria-hidden="true">
      <path style="--len:130" d="M1,6 C ${len*.25},2 ${len*.55},10 ${len},6" fill="none" stroke="${ink}" stroke-width="7" stroke-linecap="round" opacity=".92" pathLength="130"/>
      <path style="--len:40" d="M${len},6 C ${len+4},5 ${len+7},6.5 ${Math.min(len+11,99)},6" fill="none" stroke="${ink}" stroke-width="2.4" stroke-linecap="round" opacity=".4" pathLength="40"/>

/* ---------- chart helpers ---------- */
/* Chart engine v2 — sizing is decided in EXACTLY one place.
   · every canvas gets a FIXED css height (its design height) → the page never shifts vertically
   · backing store set only when the parent's WIDTH truly changes (≥8px) → mobile url-bar
     scroll resizes (height-only) are ignored entirely
   · draw functions receive cached dims and NEVER measure or resize anything */
const __charts={};                            // id -> {w,h,r}
function chartSize(c){
  const id=c.id, H=+c.getAttribute("height");
  const W=Math.round(c.parentElement.clientWidth);
  const prev=__charts[id];
  if(prev&&Math.abs(prev.w-W)<8)return false; // width unchanged → nothing to do
  const r=Math.min(devicePixelRatio,2);
  c.style.width=W+"px";c.style.height=H+"px"; // css size fixed & explicit
  c.width=W*r;c.height=H*r;                   // backing store
  __charts[id]={w:W,h:H,r};
  return true;
}
function cvs(id){                             // draw-side: cached dims only
  const c=$id(id),s=__charts[id]||(chartSize(c),__charts[id]);
  const x=c.getContext("2d");
  x.setTransform(s.r,0,0,s.r,0,0);
  return[x,s.w,s.h];
}
const __chartDraw={btCanvas:()=>drawBT(),hsCanvas:()=>drawHS(),
  hsIntra:()=>{if(hsSel)drawIntra(hsSel);},
  fcCanvas:()=>drawFC(window.__fcP,window.__fcSE),mlCanvas:()=>drawML()};
function watchCharts(){
  const ro=new ResizeObserver(es=>{
    clearTimeout(window.__crt);
    window.__crt=setTimeout(()=>{
      for(const e of es)
        e.target.querySelectorAll("canvas").forEach(c=>{
          if(chartSize(c)&&__chartDraw[c.id])try{__chartDraw[c.id]();}catch(_){}
        });
    },250);
  });
  document.querySelectorAll("#demoBT,#demoHS,#demoFC,#demoML").forEach(d=>ro.observe(d));
}

function sma(a,n){return a.map((_,i)=>i<n-1?null:a.slice(i-n+1,i+1).reduce((s,v)=>s+v,0)/n);}
function drawBT(){
  const t=T(),fast=+$id("btFast").value,slow=+$id("btSlow").value;
  $id("btFastV").textContent=fast;$id("btSlowV").textContent=slow;
  const C=OHLC.map(d=>d.c),f=sma(C,fast),s=sma(C,slow);
  let pos=0,eq=[1],hold=[1],trades=0,wins=0,entry=0;
  for(let i=1;i<C.length;i++){
    const sig=f[i-1]!=null&&s[i-1]!=null?(f[i-1]>s[i-1]?1:0):0;
    if(sig!==pos){trades++;if(pos===1&&C[i]>entry)wins++;if(sig===1)entry=C[i];pos=sig;}
    eq.push(eq[i-1]*(pos?C[i]/C[i-1]:1));hold.push(hold[i-1]*C[i]/C[i-1]);}
  const[x,w,h]=cvs("btCanvas");x.clearRect(0,0,w,h);
  const lo=Math.min(...OHLC.map(d=>d.l)),hi=Math.max(...OHLC.map(d=>d.h));
  const px=i=>14+(w-28)*i/(OHLC.length-1),py=v=>16+(h*0.62-32)*(1-(v-lo)/(hi-lo));
  OHLC.forEach((d,i)=>{const up=d.c>=d.o;x.strokeStyle=x.fillStyle=up?css("--up"):css("--dn");
    x.globalAlpha=.85;x.beginPath();x.moveTo(px(i),py(d.h));x.lineTo(px(i),py(d.l));x.stroke();
    x.fillRect(px(i)-1.4,py(Math.max(d.o,d.c)),2.8,Math.max(1.5,Math.abs(py(d.o)-py(d.c))));});
  x.globalAlpha=1;
  for(const[arr,col,wd]of[[f,css("--zhong"),1.4],[s,css("--dan"),1.4]]){
    x.strokeStyle=col;x.lineWidth=wd;x.beginPath();let m=false;
    arr.forEach((v,i)=>{if(v==null)return;m?x.lineTo(px(i),py(v)):x.moveTo(px(i),py(v));m=true;});x.stroke();}
  let prev=0;
  for(let i=1;i<C.length;i++){const sig=f[i-1]&&s[i-1]?(f[i-1]>s[i-1]?1:0):0;
    if(sig!==prev){x.fillStyle=sig?css("--shu"):css("--ai");x.font="600 11px IBM Plex Mono";
      x.fillText(sig?"▲":"▼",px(i)-4,sig?py(OHLC[i].l)+14:py(OHLC[i].h)-6);prev=sig;}}
  const eLo=Math.min(...eq,...hold),eHi=Math.max(...eq,...hold);
  const ey=v=>h*0.66+ (h*0.34-18)*(1-(v-eLo)/(eHi-eLo));
  x.strokeStyle=css("--qing");x.lineWidth=1;x.strokeRect(14,h*0.66,w-28,h*0.34-18);
  for(const[arr,col,wd]of[[hold,css("--dan"),1.3],[eq,css("--shu"),2]]){
    x.strokeStyle=col;x.lineWidth=wd;x.beginPath();
    arr.forEach((v,i)=>i?x.lineTo(px(i),ey(v)):x.moveTo(px(0),ey(v)));x.stroke();}
  const l=t.btLabels,st=[[l.ret,((eq.at(-1)-1)*100).toFixed(1)+"%",eq.at(-1)>=hold.at(-1)?"pos":"neg"],
    [l.hold,((hold.at(-1)-1)*100).toFixed(1)+"%",""],[l.trades,trades,""],
    [l.win,trades?Math.round(100*wins/Math.max(1,Math.floor(trades/2)))+"%":"—",""]];
  $id("btStats").innerHTML=st.map(([k,v,c])=>`<span>${esc(k)} <b class="${c}">${v}</b></span>`).join("");
}

  x.strokeStyle=css("--qing");x.setLineDash([3,5]);x.beginPath();x.moveTo(40,py(0));x.lineTo(w-14,py(0));x.stroke();x.setLineDash([]);

/* ---------- ③ SARIMA via webR ---------- */
function drawFC(pred,se){
  window.__fcP=pred;window.__fcSE=se;
  const[x,w,h]=cvs("fcCanvas");x.clearRect(0,0,w,h);
  const hist=RETAIL,n=hist.length,m=pred?pred.length:12;
  const all=pred?hist.concat(pred):hist;
  const lo=Math.min(...all)-(se?Math.max(...se)*2:6),hi=Math.max(...all)+(se?Math.max(...se)*2:6);
  const px=i=>14+(w-28)*i/(n+m-1),py=v=>12+(h-40)*(1-(v-lo)/(hi-lo));
  x.strokeStyle=css("--qing");x.lineWidth=1;x.strokeRect(14,12,w-28,h-40);
  if(pred){ // the fan: ±1.96·se and ±1·se
    for(const[k,a]of[[1.96,.10],[1,.18]]){
      x.fillStyle=css("--shu");x.globalAlpha=a;x.beginPath();
      pred.forEach((v,i)=>{const X=px(n+i),Y=py(v+k*se[i]);i?x.lineTo(X,Y):x.moveTo(X,Y);});
      for(let i=m-1;i>=0;i--)x.lineTo(px(n+i),py(pred[i]-k*se[i]));
      x.closePath();x.fill();x.globalAlpha=1;}}
  x.strokeStyle=css("--nong");x.lineWidth=1.6;x.beginPath();
  hist.forEach((v,i)=>i?x.lineTo(px(i),py(v)):x.moveTo(px(0),py(v)));x.stroke();
  if(pred){x.strokeStyle=css("--shu");x.lineWidth=2;x.setLineDash([6,4]);x.beginPath();
    x.moveTo(px(n-1),py(hist[n-1]));pred.forEach((v,i)=>x.lineTo(px(n+i),py(v)));x.stroke();x.setLineDash([]);}
  x.fillStyle=css("--dan");x.font="11px IBM Plex Mono";
  x.fillText(pred?"monthly series + 12-step SARIMA forecast (fan = ±1·se, ±1.96·se)":"monthly series — press ▶ to fit in R",20,h-14);
}
$id("fcRun").onclick=async()=>{
  const t=T(),btn=$id("fcRun"),out=$id("rOut");btn.disabled=true;out.hidden=false;
  const log=(s,cls)=>{const d=document.createElement("div");if(cls)d.className=cls;d.textContent=s;out.appendChild(d);out.scrollTop=out.scrollHeight;};
  $id("fcState").textContent=t.fcRunning;
  try{
    log("> loading webR (R for WebAssembly)…","rin");
    const {WebR}=await import("https://webr.r-wasm.org/latest/webr.mjs");
    const webr=new WebR();await webr.init();
    log("> R is running in your browser. fitting…","rin");
    const code=`y <- ts(c(${RETAIL.join(",")}), frequency=12)
cat("series: n =", length(y), " (monthly)\\n")
fit <- arima(y, order=c(1,1,1), seasonal=list(order=c(0,1,1), period=12))
print(fit)
p <- predict(fit, n.ahead=12)
cat("FORECAST:", paste(round(as.numeric(p$pred),3), collapse=","), "\\n")
cat("SE:", paste(round(as.numeric(p$se),3), collapse=","), "\\n")`;
    const shelter=await new webr.Shelter();
    const res=await shelter.captureR(code);
    let pred=null,se=null;
    for(const o of res.output){const s=o.data;
      if(typeof s!=="string")continue;
      log(s,o.type==="stderr"?"rerr":"");
      if(s.startsWith("FORECAST:"))pred=s.slice(9).trim().split(",").map(Number);
      if(s.startsWith("SE:"))se=s.slice(3).trim().split(",").map(Number);}
    shelter.purge();
    if(pred&&se){drawFC(pred,se);window.__rRan=true;btn.textContent="✓ R";$id("fcState").textContent="";}
    else throw new Error("no forecast lines captured");
  }catch(err){
    log("! webR unavailable ("+err.message+") — falling back to a JS Holt-Winters fit","rerr");
    const a=.35,b=.06,g=.28,P=12;let lvl=RETAIL[0],tr=0;const s=Array(P).fill(0);
    RETAIL.forEach((v,i)=>{const si=i%P,pl=lvl;lvl=a*(v-s[si])+(1-a)*(lvl+tr);
      tr=b*(lvl-pl)+(1-b)*tr;s[si]=g*(v-lvl)+(1-g)*s[si];});
    const pred=Array.from({length:12},(_,i)=>+(lvl+tr*(i+1)+s[(RETAIL.length+i)%P]).toFixed(2));
    const se=Array.from({length:12},(_,i)=>+(2.2*Math.sqrt(i+1)).toFixed(2));
    drawFC(pred,se);btn.textContent=T().fcRun;$id("fcState").textContent="";
  }finally{btn.disabled=false;}
};

/* ---------- ④ audio-ML staged bake-off ---------- */
const ML={stages:["stage 1","stage 2","final"],models:["linear","tree","forest","SVM","XGBoost"],
  acc:[[62,66,71,73,74],[68,72,78,80,83],[71,76,84,86,91]]};
function drawML(){
  const[x,w,h]=cvs("mlCanvas");x.clearRect(0,0,w,h);
  const inks=[css("--qing"),css("--dan"),css("--zhong"),css("--nong"),css("--jiao")];
  const gw=(w-60)/3;
  ML.stages.forEach((st,si)=>{
    x.fillStyle=css("--dan");x.font="11px IBM Plex Mono";x.fillText(st,40+si*gw+gw/2-18,h-8);
    ML.models.forEach((m,mi)=>{
      const bw=(gw-40)/5,X=50+si*gw+mi*bw,acc=ML.acc[si][mi],BH=(h-58)*acc/100;
      x.fillStyle=inks[mi];x.globalAlpha=.9;x.fillRect(X,h-28-BH,bw-5,BH);x.globalAlpha=1;
      if(si===2){x.save();x.translate(X+bw/2-2,h-34-BH);x.rotate(-Math.PI/2);
        x.fillStyle=css("--dan");x.font="9.5px IBM Plex Mono";x.fillText(m+" "+acc+"%",0,3);x.restore();}});});
  x.fillStyle=css("--shu");x.font="600 11px IBM Plex Mono";
  x.fillText("★ 91%",50+2*gw+4*((gw-40)/5),26);
}

/* ---------- the ink map ---------- */
function mapCard(c){
  const t=T(),d=t.mapCities[c]||t.mapCities.hk;
  $id("mapCard").innerHTML=`<b>${esc(d[0])}</b> — ${esc(d[1])}`;
  document.querySelectorAll("#inkmap .city").forEach(g=>g.classList.toggle("on",g.dataset.c===c));
}
document.querySelectorAll("#inkmap .city").forEach(g=>{
  g.addEventListener("pointerenter",()=>mapCard(g.dataset.c));
  g.addEventListener("click",()=>mapCard(g.dataset.c));});
mapCard("hk");
(()=>{const r=$id("routePath");if(!r||REDUCED)return;const L=r.getTotalLength();
  r.style.strokeDasharray="7 9";r.style.strokeDashoffset=L;
  new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){
    r.style.transition="stroke-dashoffset 2.6s ease";r.style.strokeDashoffset=0;}}),{threshold:.3}).observe($id("inkmap"));})();

/* initial draws + redraw on resize */
watchCharts();  /* width-gated ResizeObserver replaces the old resize→redraw chain */
setMode((()=>{try{return localStorage.getItem("mode")}catch(_){return null}})()||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));
render();          /* boot: safe now — every helper and const above is initialized */
drawBT();drawHS();drawML();drawFC(null,null);
</script>

<button id="inkTab" aria-label="ask about Eric">问 墨</button>
<aside id="inkDrawer" aria-label="Q and A with Eric's assistant">
  <div class="hd"><span class="v">问墨</span><span class="seal">Q·A</span>
    <p><b>Ask about Eric — answered live by his own AI serving stack.</b><br>
    书僮代主人答问，中英皆可。留名与口令即可入座；问答会被主人记录。<br>
    Leave a name + the passcode you were given. Conversations are logged.</p>
    <button id="inkClose" aria-label="close">✕</button></div>
  <div id="inkGate">
    <input id="inkName" placeholder="尊姓大名 · your name" maxlength="24" autocomplete="name"/>
    <input id="inkPass" placeholder="口令 · passcode" maxlength="8"/>
    <button id="inkEnter">入 座</button>
    <span class="err" id="inkGateErr"></span>
  </div>
  <div id="inkHints" style="display:none"></div>
  <div id="inkScroll"></div>
  <div id="inkAsk" style="display:none">
    <input id="inkQ" placeholder="Ask about Eric…" maxlength="400"/>
    <button id="inkSend">呈 上</button>
  </div>
</aside>
<script>
(function(){
const API="https://eric.aivmelna.com/showcase/inkchat/api/ask";
const $=id=>document.getElementById(id);
const I18N={
 en:{intro:"<b>Ask about Eric — answered live by his own AI serving stack.</b><br>Leave a name and the passcode you were given. Conversations are logged for Eric.",
     name:"your name",pass:"passcode",enter:"Enter",errName:"Name too short",errPass:"Passcode required",
     hints:[["What has Eric actually built?"],["Why should we interview him?"],["His quant & econometrics background?"],["Eric 最擅长什么？"]],
     greet:n=>"Welcome, "+n+". I am Eric's ink attendant — ask me anything about his work. English lies flat; 中文竖排如手卷.",
     ph:"Ask about Eric…",send:"Send",asks:" asks",ans:"Ink attendant",wrong:"Wrong passcode",
     path:"(The mountain path is blocked — please try again soon.)"},
 sc:{intro:"<b>问主人之事 — 由主人自建的 AI 服务层亲答。</b><br>留下尊姓大名与口令即可入座；问答会为主人记录在案。",
     name:"尊姓大名",pass:"口令",enter:"入 座",errName:"名字至少两个字符",errPass:"请填口令",
     hints:[["Eric 最擅长什么？"],["他的量化与计量背景？"],["他做过什么水墨作品？"],["What has Eric built?"]],
     greet:n=>n+"阁下安好 — 在下墨僮，代主人卢东奇答问。中文竖排如手卷，英文平铺如笺。请指教。",
     ph:"问主人之事…",send:"呈 上",asks:" 问",ans:"墨僮 答",wrong:"口令不对",
     path:"（山径不通，稍后再来。）"},
 tc:{intro:"<b>問主人之事 — 由主人自建的 AI 服務層親答。</b><br>留下尊姓大名與口令即可入座；問答會為主人記錄在案。",
     name:"尊姓大名",pass:"口令",enter:"入 座",errName:"名字至少兩個字符",errPass:"請填口令",
     hints:[["Eric 最擅長什麼？"],["他的量化與計量背景？"],["他做過什麼水墨作品？"],["What has Eric built?"]],
     greet:n=>n+"閣下安好 — 在下墨僮，代主人盧東奇答問。中文豎排如手卷，英文平鋪如箋。請指教。",
     ph:"問主人之事…",send:"呈 上",asks:" 問",ans:"墨僮 答",wrong:"口令不對",
     path:"（山徑不通，稍後再來。）"}};
let T9=I18N[(localStorage.getItem("lang")||"en")]||I18N.en;
function applyLang(){
  T9=I18N[(localStorage.getItem("lang")||"en")]||I18N.en;
  document.querySelector("#inkDrawer .hd p").innerHTML=T9.intro;
  $("inkName").placeholder=T9.name;$("inkPass").placeholder=T9.pass;$("inkEnter").textContent=T9.enter;
  $("inkQ").placeholder=T9.ph;$("inkSend").textContent=T9.send;
  if($("inkHints").style.display!=="none")hints();
}
document.addEventListener("langchange",applyLang);
const dr=$("inkDrawer");
$("inkTab").onclick=()=>dr.classList.add("open");
$("inkClose").onclick=()=>dr.classList.remove("open");
const esc=t=>t.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const isZh=t=>{let c=0;for(const ch of t)if(ch>="\u4e00"&&ch<="\u9fff")c++;return c>=Math.max(2,t.length*.2);};

let cred=null;
try{cred=JSON.parse(localStorage.getItem("inkchat_cred")||"null");}catch(_){}

function leaf(cls,lang,who,text,wait){
  const d=document.createElement("div");
  d.className="leaf "+cls+" "+lang;
  d.innerHTML='<div class="who">'+who+'</div><span class="txt"></span>'+(wait?' <span class="inkWait"><i></i></span>':'');
  d.querySelector(".txt").textContent=text;
  const sc=$("inkScroll");
  sc.insertBefore(d,sc.firstChild);
  return d;
}
function settle(d,text){                       // swap text without re-parsing = no blink
  d.querySelector(".txt").textContent=text;
  const w=d.querySelector(".inkWait");if(w)w.remove();
}
function hints(){
  const h=$("inkHints");h.style.display="flex";
  h.innerHTML="";
  T9.hints.forEach(([t])=>{const b=document.createElement("button");b.textContent=t;
    b.onclick=()=>{$("inkQ").value=t;send();};h.appendChild(b);});
}
function enter(){
  $("inkGate").style.display="none";$("inkAsk").style.display="flex";
  hints();
  applyLang();
  if(!$("inkScroll").children.length){
    const gl=(localStorage.getItem("lang")||"en")==="en"?"en":"zh";
    leaf("a", gl, T9.ans, T9.greet(cred.name));
  }
  $("inkQ").focus();
}
if(cred&&cred.name){$("inkName").value=cred.name;$("inkPass").value=cred.pass||"";enter();}
$("inkEnter").onclick=()=>{
  const n=$("inkName").value.trim(),p=$("inkPass").value.trim();
  if(n.length<2){$("inkGateErr").textContent=T9.errName;return;}
  if(!p){$("inkGateErr").textContent=T9.errPass;return;}
  cred={name:n,pass:p};
  try{localStorage.setItem("inkchat_cred",JSON.stringify(cred));}catch(_){}
  enter();
};
let busy=false;
async function send(){
  const q=$("inkQ").value.trim();
  if(!q||!cred||busy)return;
  busy=true;$("inkSend").disabled=true;$("inkQ").value="";
  const ql=isZh(q)?"zh":"en";
  leaf("q",ql,esc(cred.name)+T9.asks,q);
  const wait=leaf("a",ql,T9.ans,"",true);
  $("inkScroll").scrollLeft=0;
  try{
    const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:cred.name,passcode:cred.pass,question:q})});
    const d=await r.json();
    if(!r.ok){
      settle(wait,d.err||T9.wrong);
      if(r.status===403){localStorage.removeItem("inkchat_cred");cred=null;
        $("inkGate").style.display="flex";$("inkAsk").style.display="none";
        $("inkGateErr").textContent=T9.wrong;}
    }else{
      if(d.lang&&d.lang!==ql){wait.classList.remove(ql);wait.classList.add(d.lang);}
      settle(wait,d.answer||"…");
    }
  }catch(e){settle(wait,T9.path);}
  busy=false;$("inkSend").disabled=false;
}
$("inkSend").onclick=send;
$("inkQ").addEventListener("keydown",e=>{if(e.key==="Enter")send();});
})();
</script>
